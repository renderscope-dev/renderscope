{% if include_raw_data and raw_json %}
<section class="rs-section" aria-label="Raw data">
  <details class="rs-raw-data">
    <summary class="rs-raw-summary">
      <h2 class="rs-section-title rs-inline-title">Raw Data</h2>
      <span class="rs-raw-hint">Click to expand</span>
    </summary>
    <div class="rs-raw-content">
      <div class="rs-raw-toolbar">
        <button class="rs-copy-btn" data-copy-target="raw-json" aria-label="Copy raw JSON to clipboard">
          <svg viewBox="0 0 16 16" width="14" height="14" fill="currentColor" aria-hidden="true"><path d="M0 6.75C0 5.784.784 5 1.75 5h1.5a.75.75 0 010 1.5h-1.5a.25.25 0 00-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 00.25-.25v-1.5a.75.75 0 011.5 0v1.5A1.75 1.75 0 019.25 16h-7.5A1.75 1.75 0 010 14.25v-7.5z"/><path d="M5 1.75C5 .784 5.784 0 6.75 0h7.5C15.216 0 16 .784 16 1.75v7.5A1.75 1.75 0 0114.25 11h-7.5A1.75 1.75 0 015 9.25v-7.5zm1.75-.25a.25.25 0 00-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 00.25-.25v-7.5a.25.25 0 00-.25-.25h-7.5z"/></svg>
          <span>Copy</span>
        </button>
      </div>
      <pre class="rs-json-block" id="raw-json"><code>{{ raw_json }}</code></pre>
    </div>
  </details>
</section>
{% endif %}
