title: "Q&A"
labels: []
body:
  - type: markdown
    attributes:
      value: |
        Ask a question about using RenderScope — the web app, Python CLI, npm package, or data schema. Check the [documentation](https://renderscope.dev/docs) first, as your question may already be answered there.

  - type: textarea
    id: question
    attributes:
      label: "Your Question"
      description: "What would you like to know?"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: "Context"
      description: "Any relevant background — what you're trying to accomplish, what you've already tried, etc."
    validations:
      required: false
