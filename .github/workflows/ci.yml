name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Web App (Next.js)
  # ──────────────────────────────────────────────
  web:
    name: Web — Lint, Type Check & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Lint (ESLint)
        run: npm run lint

      - name: Type check (TypeScript)
        run: npm run typecheck

      - name: Run unit & component tests
        run: npm test

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-coverage
          path: web/coverage/
          retention-days: 14

      - name: Build (static export)
        run: npm run build

  # ──────────────────────────────────────────────
  # Job 1b: Cross-Browser Tests (Playwright)
  # ──────────────────────────────────────────────
  cross-browser-tests:
    name: Web — Cross-Browser Tests (${{ matrix.project }})
    runs-on: ubuntu-latest
    needs: web
    timeout-minutes: 30
    defaults:
      run:
        working-directory: web

    strategy:
      fail-fast: false
      matrix:
        include:
          # Desktop projects — always run (PRs + main)
          - project: chromium-desktop
            always: true
          - project: firefox-desktop
            always: true
          - project: webkit-desktop
            always: true
          # Mobile/tablet/wide — only on push to main
          - project: chromium-mobile
            always: false
          - project: firefox-mobile
            always: false
          - project: webkit-mobile
            always: false
          - project: chromium-tablet
            always: false
          - project: webkit-tablet
            always: false
          - project: chromium-wide
            always: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Check if full suite needed
        id: check-scope
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "full=true" >> $GITHUB_OUTPUT
          else
            echo "full=false" >> $GITHUB_OUTPUT
          fi

      - name: Run Playwright tests
        if: steps.check-scope.outputs.full == 'true' || matrix.always == true
        run: npx playwright test --project=${{ matrix.project }}
        env:
          CI: true

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.project }}
          path: web/playwright-report/
          retention-days: 7

      - name: Upload screenshot diffs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-diffs-${{ matrix.project }}
          path: web/test-results/
          retention-days: 7

  # ──────────────────────────────────────────────
  # Job 2: npm Package (renderscope-ui)
  # ──────────────────────────────────────────────
  npm-package:
    name: npm Package — Lint, Type Check & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/renderscope-ui

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Lint (ESLint)
        run: npm run lint

      - name: Type check (TypeScript)
        run: npm run typecheck

      - name: Run tests
        run: npm test -- --passWithNoTests

      - name: Build
        run: npm run build

      - name: Check bundle sizes
        run: npm run size

      - name: Verify tree-shaking
        run: npm run verify:treeshake

  # ──────────────────────────────────────────────
  # Job 3: Python Package (renderscope)
  # ──────────────────────────────────────────────
  python-package:
    name: Python — Lint, Type Check & Test (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    defaults:
      run:
        working-directory: python

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: python/pyproject.toml

      - name: Install package with dev dependencies
        run: pip install -e ".[dev]"

      - name: Lint (Ruff — check)
        run: ruff check src/renderscope tests/

      - name: Format check (Ruff — format)
        run: ruff format --check src/renderscope tests/

      - name: Type check (mypy — strict)
        run: mypy src/renderscope --strict

      - name: Run tests with coverage
        run: pytest --tb=short -q --cov=renderscope --cov-report=term-missing --cov-report=xml

      - name: Enforce coverage threshold
        run: coverage report --fail-under=65

      - name: Upload coverage report
        if: matrix.python-version == '3.12' && always()
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage
          path: python/coverage.xml
          retention-days: 14

  # ──────────────────────────────────────────────
  # Job 4: Data Validation
  # ──────────────────────────────────────────────
  validate-data:
    name: Validate Data Files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install validation dependencies
        run: pip install jsonschema

      - name: Validate JSON data against schemas
        run: python scripts/validate_data.py
