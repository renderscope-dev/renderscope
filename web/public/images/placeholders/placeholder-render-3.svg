<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0f0a"/>
      <stop offset="50%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#1a1008"/>
    </linearGradient>
    <radialGradient id="glow3" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow3b" cx="40%" cy="55%" r="45%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg3)"/>
  <rect width="1200" height="675" fill="url(#glow3)"/>
  <rect width="1200" height="675" fill="url(#glow3b)"/>
  <!-- Dot grid -->
  <g opacity="0.03">
    <pattern id="dots" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="1" fill="#fff"/>
    </pattern>
    <rect width="1200" height="675" fill="url(#dots)"/>
  </g>
  <!-- Bunny silhouette abstract -->
  <ellipse cx="600" cy="320" rx="80" ry="90" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.15"/>
  <ellipse cx="570" cy="230" rx="20" ry="50" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.1" transform="rotate(-15 570 230)"/>
  <ellipse cx="630" cy="230" rx="20" ry="50" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.1" transform="rotate(15 630 230)"/>
  <!-- Text -->
  <text x="600" y="438" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#fff" opacity="0.25" letter-spacing="3">SAMPLE RENDER</text>
  <text x="600" y="460" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#fff" opacity="0.15" letter-spacing="2">STANFORD BUNNY</text>
</svg>
